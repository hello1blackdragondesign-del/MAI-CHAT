<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAICHAT</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css"/>
</head>
<body>
  <div class="app">
    <!-- Hamburger Button -->
    <button id="hamburger" class="hamburger">
      <i class="fa-solid fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fa-solid fa-brain"></i>
          <span>MAICHAT</span>
        </div>
        <button id="close-sidebar" class="close-btn">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      
      <button id="new-chat" class="new-chat-btn">
        <i class="fa-solid fa-plus"></i> New Chat
      </button>

      <div class="chat-history" id="chat-history"></div>

      <div class="sidebar-bottom">
        <button id="export-chat"><i class="fa-solid fa-download"></i> Export Chat</button>
        <button id="clear-all"><i class="fa-solid fa-trash"></i> Clear All</button>
        <button id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
        <button id="settings-btn"><i class="fa-solid fa-gear"></i> Settings</button>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main">
      <header>
        <div class="header-left">
          <h1>MAICHAT</h1>
          <select id="model-select" class="model-select">
            <option value="fast">Fast Mode</option>
            <option value="thinking" selected>Thinking Mode</option>
            <option value="creative">Creative Mode</option>
          </select>
        </div>
        <div class="model-info">Advanced AI • Lagos</div>
      </header>

      <div id="chat-container" class="chat-container"></div>

      <div id="suggested-prompts" class="suggested-prompts"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <button id="attach-btn" class="tool-btn"><i class="fa-solid fa-paperclip"></i></button>
          <button id="voice-btn" class="tool-btn"><i class="fa-solid fa-microphone"></i></button>
          <button id="image-gen-btn" class="tool-btn"><i class="fa-solid fa-image"></i></button>
          
          <textarea id="user-input" rows="1" placeholder="Message MAICHAT..."></textarea>
          
          <button id="send-btn" class="send-btn">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
        <p class="disclaimer">MAICHAT can make mistakes. Verify important info.</p>
      </div>
    </div>
  </div>

  <!-- Mobile Overlay -->
  <div id="overlay" class="overlay"></div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"/>

  <script src="script.js"></script>
</body>
</html>
