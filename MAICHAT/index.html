<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAICHAT</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
</head>
<body>
  <div class="app">
    <!-- Hamburger -->
    <button id="hamburger" class="hamburger">
      <i class="fa-solid fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fa-solid fa-brain"></i>
          <span>MAICHAT</span>
        </div>
        <button id="close-sidebar" class="close-btn">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      
      <button id="new-chat" class="new-chat-btn">
        <i class="fa-solid fa-plus"></i> New Chat
      </button>

      <div class="chat-history" id="chat-history"></div>

      <div class="sidebar-bottom">
        <button id="clear-all"><i class="fa-solid fa-trash"></i> Clear All</button>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main">
      <header>
        <div class="header-content">
          <div class="title-group">
            <h1>MAICHAT</h1>
            <div class="subtitle">Advanced AI • Lagos</div>
          </div>

          <div class="mode-selector">
            <select id="model-select">
              <option value="thinking" selected>Thinking Mode</option>
              <option value="fast">Fast Mode</option>
              <option value="creative">Creative Mode</option>
            </select>
          </div>
        </div>
      </header>

      <div id="chat-container" class="chat-container"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <button id="attach-btn" class="tool-btn"><i class="fa-solid fa-paperclip"></i></button>
          <button id="voice-btn" class="tool-btn"><i class="fa-solid fa-microphone"></i></button>
          <button id="image-btn" class="tool-btn"><i class="fa-solid fa-image"></i></button>
          <button id="video-btn" class="tool-btn"><i class="fa-solid fa-video"></i></button>
          
          <textarea id="user-input" rows="1" placeholder="Message MAICHAT..."></textarea>
          
          <button id="send-btn" class="send-btn">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
        <p class="disclaimer">MAICHAT can make mistakes. Verify important information.</p>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>

  <script src="script.js"></script>
</body>
</html>
