<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAICHAT</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-brain"></i>
        <span>MAICHAT</span>
      </div>
      
      <button id="new-chat" class="new-chat-btn">
        <i class="fa-solid fa-plus"></i> New Chat
      </button>
      
      <div class="chat-history" id="chat-history">
        <!-- Previous chats will appear here -->
      </div>
      
      <div class="sidebar-bottom">
        <button id="settings-btn">
          <i class="fa-solid fa-gear"></i> Settings
        </button>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main">
      <header>
        <h1>MAICHAT</h1>
        <div class="model-info">Intelligent AI Assistant</div>
      </header>

      <div id="chat-container" class="chat-container">
        <!-- Messages will be added here -->
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="user-input" rows="1" placeholder="Message MAICHAT..."></textarea>
          <button id="send-btn" class="send-btn">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
        <p class="disclaimer">MAICHAT can make mistakes. Verify important information.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
